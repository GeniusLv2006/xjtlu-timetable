# Security response headers — include this file in your nginx server {} block:
#   include /path/to/nginx-security-headers.conf;
#
# These complement the CSP meta tag in index.html and add HTTP-only directives
# (frame-ancestors, X-Frame-Options) that meta tags cannot provide.

add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://timetableplus.xjtlu.edu.cn; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
